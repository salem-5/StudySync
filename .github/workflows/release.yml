name: Build and Release

on:
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  get-version:
    name: Extract Version
    runs-on: ubuntu-latest
    outputs:
      VERSION: ${{ steps.extract.outputs.VERSION }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from CMakeLists.txt
        id: extract
        run: |
          # Specifically looks for VERSION on the line containing the 'project' command
          VERSION=$(grep -i "project" CMakeLists.txt | grep -oP 'VERSION\s+\K[0-9.]+')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

  build:
    name: Build ${{ matrix.os_name }} (${{ matrix.arch }})
    needs: get-version
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            os_name: linux
            arch: amd64
          - runner: ubuntu-24.04-arm
            os_name: linux
            arch: arm64
          - runner: macos-latest
            os_name: macos
            arch: arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - if: matrix.os_name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libboost-all-dev
          
      - if: matrix.os_name == 'linux'
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.0'

      - if: matrix.os_name == 'macos'
        run: |
          brew install qt@6 boost
          brew link --force qt@6

      - name: Configure and Build
        shell: bash
        run: |
          if [ "${{ matrix.os_name }}" == "macos" ]; then
            QT_PREFIX=$(brew --prefix qt@6)
            cmake -B build -S . -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$QT_PREFIX"
          else
            cmake -B build -S . -DCMAKE_BUILD_TYPE=Release
          fi
          cmake --build build --config Release --parallel

      - name: Stage binaries
        shell: bash
        run: |
          mkdir -p staging
          # Check common build locations for single-config generators (Linux/Mac)
          if [ -f "build/server/studysync_server" ]; then
            cp "build/server/studysync_server" "staging/studysync_server-${{ matrix.os_name }}-${{ matrix.arch }}"
            cp "build/client/studysync_client" "staging/studysync_client-${{ matrix.os_name }}-${{ matrix.arch }}"
          else
            # Fallback search if paths differ
            find build -name "studysync_server" -exec cp {} "staging/studysync_server-${{ matrix.os_name }}-${{ matrix.arch }}" \;
            find build -name "studysync_client" -exec cp {} "staging/studysync_client-${{ matrix.os_name }}-${{ matrix.arch }}" \;
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.os_name }}-${{ matrix.arch }}
          path: staging/*
          retention-days: 1

  release:
    name: Create GitHub Release
    needs: [get-version, build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code (to access changelog.md)
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: binaries-*
          merge-multiple: true

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.get-version.outputs.VERSION }}
          name: Release v${{ needs.get-version.outputs.VERSION }}
          body_path: changelog.md
          files: artifacts/*
